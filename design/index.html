<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>RepoLore — Turn any codebase into a knowledge graph</title>
  <meta name="description" content="Paste a GitHub repo and get an OKF knowledge bundle plus an interactive knowledge graph. Ask questions and watch the agent walk the graph." />
  <meta name="theme-color" content="#0a0b0c" />
  <meta property="og:title" content="RepoLore — Turn any codebase into a knowledge graph" />
  <meta property="og:description" content="Paste a GitHub repo, get an OKF bundle and an interactive knowledge graph. Graph-traversal answers, not flat RAG." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='9' cy='23' r='4' fill='%236d5efc'/%3E%3Ccircle cx='23' cy='9' r='4' fill='%236d5efc'/%3E%3Ccircle cx='24' cy='24' r='3' fill='%23555a66'/%3E%3Cpath d='M11 20L21 11M12 24h9' stroke='%236d5efc' stroke-width='1.6'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Prebuilt, minified Tailwind — generated from tailwind.config.js. No CDN, no in-browser compile.
       Rebuild after changing markup/classes: npx -y tailwindcss@3.4.17 -c design/tailwind.config.js -i design/tailwind.input.css -o design/styles.css --minify -->
  <link rel="stylesheet" href="styles.css" />

  <style>
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0b0c;
      color: #e6e8eb;
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .grad-accent {
      background: linear-gradient(102deg, #e6e8eb 0%, #b9b3ff 46%, #6d5efc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s cubic-bezier(0.22, 0.61, 0.36, 1),
                  transform 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    .reveal.is-in { opacity: 1; transform: none; }

    .grid-dots {
      background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      background-position: -1px -1px;
    }

    .panel-scroll::-webkit-scrollbar { width: 8px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 8px; }

    @keyframes pulse-soft { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .pulse-soft { animation: pulse-soft 1.4s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .reveal { opacity: 1; transform: none; transition: none; }
      .pulse-soft { animation: none; }
    }

    .focus-ring:focus-within {
      border-color: rgba(109, 94, 252, 0.7);
      box-shadow: 0 0 0 4px rgba(109, 94, 252, 0.14);
    }

    #errbar {
      display: none;
      position: fixed; inset: 0 0 auto 0; z-index: 90;
      padding: 12px 16px;
      background: #1a1113; color: #ff9a9a;
      font-family: "JetBrains Mono", monospace; font-size: 12px;
      border-bottom: 1px solid rgba(255,120,120,0.3);
      white-space: pre-wrap;
    }
    #boot { padding: 48px 24px; font-family: "JetBrains Mono", monospace; color: #5b6069; font-size: 13px; }
  </style>

  <script>
    // Fail loud, not blank. If nothing renders in 5s, or a script throws, say so.
    window.addEventListener("error", function (e) {
      var b = document.getElementById("errbar");
      if (b) {
        b.style.display = "block";
        b.textContent = "Load error: " + (e.message || e.error) +
          (e.filename ? "\n" + e.filename + ":" + (e.lineno || "") : "");
      }
    });
    window.__bootTimer = setTimeout(function () {
      var boot = document.getElementById("boot");
      if (boot) {
        boot.textContent =
          "App scripts did not run. If you opened this as a file, serve it through the RepoLore server instead (uvicorn app:app), then reload.";
        boot.style.color = "#ff9a9a";
      }
    }, 5000);
  </script>
</head>
<body>
  <div id="errbar"></div>
  <div id="root"><div id="boot">Loading RepoLore…</div></div>

  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
